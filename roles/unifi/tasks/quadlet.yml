---
- name: Create Quadlet directory
  become: true
  ansible.builtin.file:
    path: "{{ unifi_quadlet_dir }}"
    state: directory
    mode: "0755"

- name: Deploy Quadlet network
  become: true
  ansible.builtin.template:
    src: "quadlet/unifi.network.j2"
    dest: "{{ unifi_quadlet_dir }}/unifi.network"
    mode: "0644"
  notify: Reload systemd

- name: Deploy Quadlet volumes
  become: true
  ansible.builtin.template:
    src: "quadlet/{{ item }}.j2"
    dest: "{{ unifi_quadlet_dir }}/{{ item }}"
    mode: "0644"
  loop:
    - unifi-data.volume
    - mongodb-data.volume
  notify: Reload systemd

- name: Deploy mongodb container quadlet
  become: true
  ansible.builtin.template:
    src: "quadlet/mongodb.container.j2"
    dest: "{{ unifi_quadlet_dir }}/mongodb.container"
    mode: "0644"
  notify:
    - Reload systemd
    - Restart mongodb

- name: Deploy unifi-controller container quadlet
  become: true
  ansible.builtin.template:
    src: "quadlet/unifi-controller.container.j2"
    dest: "{{ unifi_quadlet_dir }}/unifi-controller.container"
    mode: "0644"
  notify:
    - Reload systemd
    - Restart unifi-controller

- name: Deploy traefik container quadlet
  become: true
  ansible.builtin.template:
    src: "quadlet/traefik.container.j2"
    dest: "{{ unifi_quadlet_dir }}/traefik.container"
    mode: "0644"
  notify:
    - Reload systemd
    - Restart traefik

- name: Deploy backup-toolkit container quadlet
  become: true
  ansible.builtin.template:
    src: "quadlet/backup-toolkit.container.j2"
    dest: "{{ unifi_quadlet_dir }}/backup-toolkit.container"
    mode: "0644"
  notify:
    - Reload systemd
    - Restart backup-toolkit

- name: Reload systemd daemon
  become: true
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable and start services
  become: true
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true
  loop:
    - mongodb
    - unifi-controller
    - traefik
